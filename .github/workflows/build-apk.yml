name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm install

      - name: Copy web assets
        run: npm run copy:web

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk weight-tracker.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: weight-tracker-apk
          path: weight-tracker.apk

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-latest
          name: 최신 APK (체중 기록)
          body: |
            자동 빌드된 안드로이드 앱입니다.
            아래 **weight-tracker.apk**를 폰에서 받아 설치하세요.
            (설정에서 "출처를 알 수 없는 앱 설치" 허용 필요)
          prerelease: true
          files: weight-tracker.apk
